<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bahiran Driver Profile — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #f0f2f5;
  --surface:   #ffffff;
  --surface2:  #f8f9fb;
  --border:    #e2e6ed;
  --border2:   #d0d5dd;
  --brand:     #582d18;
  --brand-h:   #6e3920;
  --brand-lt:  #f9f0eb;
  --accent:    #1a56db;
  --accent-h:  #1648c0;
  --green:     #0e9f6e;
  --green-bg:  #ecfdf5;
  --red:       #e02424;
  --red-bg:    #fef2f2;
  --yellow:    #c27803;
  --yellow-bg: #fffbeb;
  --blue-bg:   #eff6ff;
  --purple:    #7c3aed;
  --purple-bg: #f5f3ff;
  --text:      #111928;
  --text2:     #374151;
  --muted:     #6b7280;
  --muted2:    #9ca3af;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Inter', sans-serif;
  --r:         5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:13px;}

/* ─────────────────── LOGIN ─────────────────── */
#login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(145deg,#582d18 0%,#3a1c0e 60%,#1a0a05 100%);
}
.login-box{
  background:#fff;border-radius:10px;padding:40px 36px;width:360px;
  box-shadow:0 24px 64px rgba(0,0,0,.35);
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .l-icon{
  width:52px;height:52px;background:var(--brand);border-radius:var(--r);
  display:inline-flex;align-items:center;justify-content:center;font-size:24px;
  margin-bottom:12px;box-shadow:0 4px 14px rgba(88,45,24,.35);
}
.login-logo h1{font-size:15px;font-weight:700;color:var(--text);}
.login-logo p{font-size:11.5px;color:var(--muted);margin-top:3px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.field input{
  width:100%;background:#f9fafb;border:1px solid var(--border2);
  color:var(--text);padding:9px 12px;border-radius:var(--r);
  font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;
}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(88,45,24,.12);background:#fff;}
.btn-login{
  width:100%;background:var(--brand);color:#fff;border:none;
  padding:10px;border-radius:var(--r);font-family:var(--sans);font-size:13px;
  font-weight:600;cursor:pointer;margin-top:4px;letter-spacing:.3px;transition:background .15s;
}
.btn-login:hover{background:var(--brand-h);}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

/* ─────────────────── LAYOUT ─────────────────── */
#main-screen{display:none;flex-direction:column;min-height:100vh;}

/* ─────────────────── TOPBAR ─────────────────── */
.topbar{
  background:var(--brand);
  padding:0 20px;height:44px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(88,45,24,.3);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-left .t-icon{font-size:16px;}
.topbar-left .t-title{font-size:12px;font-weight:700;color:#fff;letter-spacing:.02em;}
.topbar-nav{display:flex;align-items:center;gap:4px;margin-left:16px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.topbar-nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 8px;border-radius:4px;transition:color .15s,background .15s;}
.topbar-nav a:hover{color:#fff;background:rgba(255,255,255,.15);}
.topbar-nav .current{color:#fff;cursor:default;}
.topbar-nav .sep{color:rgba(255,255,255,.4);user-select:none;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.admin-chip{background:rgba(255,255,255,.18);color:#fff;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.25);}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.85);padding:4px 10px;border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.btn-logout:hover{background:rgba(255,255,255,.15);color:#fff;}

/* ─────────────────── STATS ─────────────────── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);
}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-card.total    .stat-icon{background:#f0f5ff;}
.stat-card.pending  .stat-icon{background:#fffbeb;}
.stat-card.approved .stat-icon{background:#ecfdf5;}
.stat-card.rejected .stat-icon{background:#fef2f2;}
.s-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.s-value{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1;}
.stat-card.total    .s-value{color:var(--brand);}
.stat-card.pending  .s-value{color:var(--yellow);}
.stat-card.approved .s-value{color:var(--green);}
.stat-card.rejected .s-value{color:var(--red);}

/* ─────────────────── TOOLBAR ─────────────────── */
.toolbar{
  padding:12px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none;}
.search-box{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:7px 12px 7px 32px;border-radius:var(--r);
  font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-box:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(88,45,24,.1);background:#fff;}
.filter-select{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:7px 12px;border-radius:var(--r);font-size:12px;outline:none;cursor:pointer;}

/* ─────────────────── BUTTONS ─────────────────── */
.btn{
  padding:6px 13px;border-radius:var(--r);font-size:12px;cursor:pointer;border:none;
  font-family:var(--sans);font-weight:500;display:inline-flex;align-items:center;
  gap:5px;transition:all .15s;white-space:nowrap;line-height:1.4;
  position:relative;
}
.btn-primary{background:var(--brand);color:#fff;}
.btn-primary:hover{background:var(--brand-h);}
.btn-outline{background:#fff;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--brand);color:var(--brand);}
.btn-sms-toolbar{background:#1d4ed8;color:#fff;}
.btn-sms-toolbar:hover{background:#1e40af;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
/* accordion action buttons */
.btn-approve{background:var(--green-bg);border:1px solid #a7f3d0;color:var(--green);padding:6px 12px;}
.btn-approve:hover:not(:disabled){background:var(--green);color:#fff;border-color:var(--green);}
.btn-reject{background:var(--red-bg);border:1px solid #fca5a5;color:var(--red);padding:6px 12px;}
.btn-reject:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red);}
.btn-dl{background:var(--blue-bg);border:1px solid #bfdbfe;color:var(--accent);padding:6px 12px;}
.btn-dl:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-sms-single{background:var(--purple-bg);border:1px solid #ddd6fe;color:var(--purple);padding:6px 12px;}
.btn-sms-single:hover:not(:disabled){background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-delete{background:var(--red-bg);border:1px solid #fca5a5;color:var(--red);padding:6px 12px;}
.btn-delete:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red);}

/* Spinner inside button */
.btn-spin{display:none;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .5s linear infinite;flex-shrink:0;}
.btn.loading .btn-spin{display:inline-block;}
.btn.loading .btn-lbl{opacity:.6;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─────────────────── TABLE ─────────────────── */
.table-wrap{flex:1;overflow-x:auto;padding:0 24px 32px;}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12.5px;}
thead th{
  background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted);font-weight:600;white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:not(.accordion-row):hover{background:#fdf7f4;}
tbody tr.expanded{background:#fdf0e8;}
td{padding:10px 12px;vertical-align:middle;}
td .ref{font-family:var(--mono);font-size:11.5px;color:var(--brand);font-weight:700;}
td .name{font-weight:500;color:var(--text);}
td .phone{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
td .plate{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:3px;display:inline-block;}
.status-badge{padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.3px;display:inline-block;text-transform:capitalize;}
.status-pending {background:var(--yellow-bg);color:var(--yellow);}
.status-approved{background:var(--green-bg);color:var(--green);}
.status-rejected{background:var(--red-bg);  color:var(--red);}
.transport-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;}
.transport-badge.transport-car{background:#eff6ff;color:#1d4ed8;}
.transport-badge.transport-motor{background:#fef3c7;color:#b45309;}
.transport-badge.transport-bike{background:#ecfdf5;color:#0e9f6e;}

/* ─────────────────── ACCORDION ─────────────────── */
/* Hide entire accordion row until expanded — keeps actions inside table, no row between data rows */
.accordion-row{display:none;}
.accordion-row.open{display:table-row;}
.accordion-row td{padding:0;}
.accordion-inner{
  padding:20px 24px;background:#fff;
  border-top:3px solid var(--brand);border-bottom:1px solid var(--border);
}
.accordion-inner.open{animation:slideDown .18s ease-out;}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.acc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
.acc-section h4{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--brand);margin-bottom:10px;padding-bottom:7px;
  border-bottom:2px solid var(--brand-lt);
}
.acc-section h4.acc-doc-title{white-space:nowrap;}
.acc-field{margin-bottom:9px;}
.acc-field .key{font-size:10.5px;color:var(--muted);margin-bottom:2px;font-weight:500;}
.acc-field .val{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500;}

/* ─────────────────── DOCUMENT THUMBNAILS ─────────────────── */
.doc-thumbs{display:flex;gap:10px;flex-wrap:wrap;}
.doc-thumb{
  width:90px;cursor:pointer;border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;background:var(--surface2);transition:all .18s;flex-shrink:0;
}
.doc-thumb:hover{border-color:var(--brand);box-shadow:0 3px 12px rgba(88,45,24,.18);transform:translateY(-2px);}
.doc-thumb:hover .thumb-label{background:var(--brand);color:#fff;}
.thumb-img{width:100%;height:66px;object-fit:cover;display:block;}
.thumb-pdf{width:100%;height:66px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef3c7,#fde68a);font-size:28px;}
.thumb-err{width:100%;height:66px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;font-size:22px;}
.thumb-label{padding:5px 6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--brand);letter-spacing:.5px;text-align:center;border-top:1px solid var(--border);transition:all .15s;background:#fff;}
.doc-thumb-empty{width:90px;height:96px;border:1px dashed var(--border2);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--muted2);background:var(--surface2);}
.doc-thumb-empty span{font-size:11px;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.doc-thumb-not-required{cursor:default;opacity:.85;}
.doc-thumb-not-required span:last-child{font-size:9px;text-align:center;line-height:1.2;}

/* ─────────────────── ACC ACTIONS ─────────────────── */
.accordion-inner.open .acc-actions{
  margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding-top:14px;border-top:1px solid var(--border);
}

/* ─────────────────── IMAGE ZOOM MODAL ─────────────────── */
#img-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  z-index:500;align-items:center;justify-content:center;flex-direction:column;padding:20px;
}
#img-modal.open{display:flex;}
#img-modal-inner{position:relative;display:flex;flex-direction:column;align-items:center;}
#img-modal-img{
  max-width:88vw;max-height:78vh;border-radius:var(--r);display:block;
  object-fit:contain;box-shadow:0 24px 80px rgba(0,0,0,.7);transition:transform .2s;
}
#img-modal-pdf{width:min(820px,90vw);height:min(560px,80vh);border:none;border-radius:var(--r);display:none;}
#img-modal-close{
  position:absolute;top:-14px;right:-14px;width:30px;height:30px;
  background:#fff;border:none;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.3);transition:all .15s;font-weight:700;
}
#img-modal-close:hover{background:#fee2e2;color:var(--red);}
.img-modal-footer{display:flex;align-items:center;gap:10px;margin-top:14px;}
#img-modal-label{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.zoom-btns{display:flex;gap:6px;}
.zoom-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;padding:5px 14px;border-radius:var(--r);font-size:12px;
  cursor:pointer;transition:background .15s;font-family:var(--sans);
}
.zoom-btn:hover{background:rgba(255,255,255,.25);}

/* ─────────────────── SMS MODAL ─────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border:1px solid var(--border);border-radius:8px;width:460px;max-width:95vw;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;}
.modal .subtitle{color:var(--muted);font-size:12px;margin-bottom:16px;}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--r);font-family:var(--sans);font-size:13px;resize:vertical;min-height:110px;outline:none;transition:border-color .15s;}
.modal textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(88,45,24,.1);}
.char-count{text-align:right;font-size:11px;color:var(--muted);margin-top:4px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.recipients-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-bottom:14px;font-size:11px;color:var(--muted);font-family:var(--mono);max-height:70px;overflow-y:auto;line-height:1.6;}

/* ─────────────────── MISC ─────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .e-icon{font-size:40px;margin-bottom:10px;}
.empty p{font-size:13px;}
#toast{
  position:fixed;bottom:20px;right:20px;z-index:999;
  background:#1f2937;border-left:3px solid var(--brand);
  color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12.5px;
  box-shadow:0 6px 20px rgba(0,0,0,.25);transform:translateY(60px);opacity:0;
  transition:all .25s;max-width:300px;
}
#toast.show{transform:translateY(0);opacity:1;}
#toast.err{border-left-color:var(--red);}
#toast.ok {border-left-color:var(--green);}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;}
.loading-row td{text-align:center;padding:48px;color:var(--muted);}
input[type=checkbox]{accent-color:var(--brand);width:14px;height:14px;cursor:pointer;}
@media(max-width:768px){
  .stats-bar{grid-template-columns:1fr 1fr;}
  .acc-grid{grid-template-columns:1fr;}
  .table-wrap,.toolbar,.topbar{padding:10px 12px;}
  .table-wrap{padding-bottom:20px;}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="l-icon">🏍️</div>
      <h1>Bahiran Driver Profile</h1>
      <p>Admin Portal — Secure Access</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>PIN Code</label>
      <input type="password" id="login-pin" placeholder="••••" autocomplete="current-password" maxlength="20"/>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════ MAIN ══════════ -->
<div id="main-screen">

  <div class="topbar">
    <div class="topbar-left">
      <span class="t-icon">🏍️</span>
      <span class="t-title">Bahiran Driver Profile — Portal</span>
      <nav class="topbar-nav">
        <a href="/">Register</a>
        <span class="sep">|</span>
        <span class="current">Admin</span>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="admin-chip" id="admin-name-display">admin</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card total">   <div class="stat-icon">📋</div><div><div class="s-label">Total</div>   <div class="s-value" id="stat-total">—</div></div></div>
    <div class="stat-card pending"> <div class="stat-icon">⏳</div><div><div class="s-label">Pending</div> <div class="s-value" id="stat-pending">—</div></div></div>
    <div class="stat-card approved"><div class="stat-icon">✅</div><div><div class="s-label">Approved</div><div class="s-value" id="stat-approved">—</div></div></div>
    <div class="stat-card rejected"><div class="stat-icon">❌</div><div><div class="s-label">Rejected</div><div class="s-value" id="stat-rejected">—</div></div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input class="search-box" id="search-input" type="text" placeholder="Search name, phone, plate, ref…" oninput="renderTable()"/>
    </div>
    <select class="filter-select" id="status-filter" onchange="renderTable()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
    <button class="btn btn-outline" onclick="refreshData()">↻ Refresh</button>
    <button class="btn btn-primary" id="btn-dl-selected" onclick="downloadSelected()" disabled>
      <span class="btn-spin"></span><span class="btn-lbl">⬇ Download ZIP</span>
    </button>
    <button class="btn btn-sms-toolbar" id="btn-sms-bulk" onclick="openSmsBulk()" disabled>
      <span class="btn-spin"></span><span class="btn-lbl">✉ Send SMS</span>
    </button>
    <button class="btn btn-delete" id="btn-delete-selected" onclick="deleteSelected()" disabled>
      <span class="btn-spin"></span><span class="btn-lbl">🗑 Delete selected</span>
    </button>
  </div>

  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th style="width:36px"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"/></th>
          <th>REF</th><th>Driver</th><th>Phone</th><th>Plate</th><th>Transport</th>
          <th>Brand / Year</th><th>Status</th><th>Registered</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row"><td colspan="9"><div class="loader"></div> Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ══════════ IMAGE / PDF ZOOM MODAL ══════════ -->
<div id="img-modal" onclick="closeImgModal(event)">
  <div id="img-modal-inner">
    <button id="img-modal-close" onclick="closeImgModal(null,true)">✕</button>
    <img id="img-modal-img" src="" alt=""/>
    <iframe id="img-modal-pdf" src=""></iframe>
  </div>
  <div class="img-modal-footer">
    <div id="img-modal-label"></div>
    <div class="zoom-btns" id="zoom-btns">
      <button class="zoom-btn" onclick="changeZoom(-20)">− Out</button>
      <button class="zoom-btn" onclick="resetZoom()">↺ Reset</button>
      <button class="zoom-btn" onclick="changeZoom(20)">+ In</button>
    </div>
  </div>
</div>

<!-- ══════════ SMS MODAL ══════════ -->
<div class="modal-overlay" id="sms-modal">
  <div class="modal">
    <h3>✉ Send SMS</h3>
    <p class="subtitle" id="sms-modal-subtitle">Sending to selected drivers</p>
    <div class="recipients-preview" id="sms-recipients"></div>
    <textarea id="sms-message" placeholder="Type your message here…" oninput="updateCharCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> / 160 chars</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSmsModal()">Cancel</button>
      <button class="btn btn-sms-toolbar" onclick="sendSms()">
        <span class="btn-spin"></span><span class="btn-lbl">Send SMS</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
let allData = [], expandedRef = null, smsTargets = [], zoomLevel = 100;

/* ── Toast ──────────────────────────────────────── */
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 3000);
}

/* ── Helpers ────────────────────────────────────── */
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function statusBadge(s){
  const m = {pending:'status-pending',approved:'status-approved',rejected:'status-rejected'};
  return `<span class="status-badge ${m[s]||'status-pending'}">${s||'pending'}</span>`;
}
function transportLabel(t){
  const v = (t||'').toLowerCase();
  const icons = {car:'🚗',motor:'🏍',bike:'🚲'};
  const labels = {car:'Car',motor:'Motor',bike:'Bicycles'};
  const icon = icons[v]||'•'; const label = labels[v]||(v||'—');
  return `<span class="transport-badge transport-${v}" title="${label}">${icon} ${label}</span>`;
}
function normalizePhone(p){
  if(!p) return p;
  p = p.replace(/[\s\-]/g,'');
  if(p.startsWith('+2519')||p.startsWith('+2517')) return '0'+p.slice(4);
  if(p.startsWith('+251')) return '0'+p.slice(4);
  if(!p.startsWith('0')) return '0'+p;
  return p;
}
function isPdf(url){ return url && url.toLowerCase().split('?')[0].endsWith('.pdf'); }

/* ── Button spinner ─────────────────────────────── */
function setBtnLoading(btn, loading){
  if(!btn) return;
  if(loading){ btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

/* ── Doc thumbnails ─────────────────────────────── */
function escapeAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeJs(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function docThumbHtml(url, label, notRequiredLabel){
  if(notRequiredLabel){
    return `<div class="doc-thumb-empty doc-thumb-not-required"><span style="font-size:18px">—</span><span>${escapeAttr(notRequiredLabel)}</span></div>`;
  }
  if(!url){
    return `<div class="doc-thumb-empty"><span style="font-size:22px">📄</span><span>${escapeAttr(label)}</span></div>`;
  }
  const urlA = escapeAttr(url), labelA = escapeAttr(label);
  const urlJ = escapeJs(url), labelJ = escapeJs(label);
  const pdf = isPdf(url);
  const inner = pdf
    ? `<div class="thumb-pdf">📕</div>`
    : `<img class="thumb-img" src="${urlA}" alt="${labelA}" onerror="this.outerHTML='&lt;div class=thumb-err&gt;🖼&lt;/div&gt;'" loading="lazy" referrerpolicy="no-referrer" />`;
  return `<div class="doc-thumb" onclick="openImgModal('${urlJ}','${labelJ}')" title="View ${labelA}">
    ${inner}
    <div class="thumb-label">${labelA}</div>
  </div>`;
}

/* ── Smart action buttons (toggle based on status) ── */
function actionBtns(ref, status){
  // Show only the opposite-action button + always show download + sms
  const approveBtn = status === 'approved' ? '' :
    `<button class="btn btn-approve" onclick="doStatus(this,'${ref}','approved')">
       <span class="btn-spin"></span><span class="btn-lbl">✓ Approve</span></button>`;
  const rejectBtn = status === 'rejected' ? '' :
    `<button class="btn btn-reject" onclick="doStatus(this,'${ref}','rejected')">
       <span class="btn-spin"></span><span class="btn-lbl">✗ Reject</span></button>`;
  return approveBtn + rejectBtn;
}

/* ── Image / PDF zoom modal ─────────────────────── */
function openImgModal(url, label){
  zoomLevel = 100;
  const img  = document.getElementById('img-modal-img');
  const pdf  = document.getElementById('img-modal-pdf');
  const lbl  = document.getElementById('img-modal-label');
  const zbts = document.getElementById('zoom-btns');
  lbl.textContent = label;
  if(isPdf(url)){
    img.style.display = 'none'; img.src = '';
    pdf.style.display = 'block'; pdf.src = url;
    zbts.style.display = 'none';
  } else {
    pdf.style.display = 'none'; pdf.src = '';
    img.style.display = 'block'; img.src = url;
    img.style.transform = 'scale(1)';
    zbts.style.display = 'flex';
  }
  document.getElementById('img-modal').classList.add('open');
}
function closeImgModal(e, force){
  if(force || !e || e.target === document.getElementById('img-modal')){
    document.getElementById('img-modal').classList.remove('open');
    setTimeout(() => {
      document.getElementById('img-modal-img').src = '';
      document.getElementById('img-modal-pdf').src = '';
    }, 200);
  }
}
function changeZoom(delta){
  zoomLevel = Math.min(300, Math.max(25, zoomLevel + delta));
  document.getElementById('img-modal-img').style.transform = `scale(${zoomLevel/100})`;
}
function resetZoom(){
  zoomLevel = 100;
  document.getElementById('img-modal-img').style.transform = 'scale(1)';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeImgModal(null,true); });

/* ── Auth ───────────────────────────────────────── */
async function doLogin(){
  const btn  = document.getElementById('login-btn');
  const user = document.getElementById('login-user').value.trim();
  const pin  = document.getElementById('login-pin').value.trim();
  const err  = document.getElementById('login-err');
  err.textContent = '';
  if(!user || !pin){ err.textContent = 'Enter username and PIN'; return; }
  btn.textContent = '…'; btn.disabled = true;
  try{
    const r = await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,pin})});
    const d = await r.json();
    if(d.success){
      document.getElementById('admin-name-display').textContent = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'flex';
      loadData();
    } else { err.textContent = d.message || 'Invalid credentials'; }
  } catch(e){ err.textContent = 'Server error'; }
  btn.textContent = 'Sign In'; btn.disabled = false;
}
document.getElementById('login-pin').addEventListener('keydown',  e => { if(e.key==='Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pin').focus(); });

async function doLogout(){
  await fetch('/admin/logout',{method:'POST'});
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pin').value = '';
  allData = [];
}

/* ── Data ───────────────────────────────────────── */
async function loadData(){
  document.getElementById('table-body').innerHTML =
    '<tr class="loading-row"><td colspan="9"><div class="loader"></div> Loading registrations…</td></tr>';
  try{
    const r = await fetch('/admin/registrations');
    if(r.status === 401){
      try { const d = await r.json(); document.getElementById('login-err').textContent = d.message || 'Session expired. Please log in again.'; } catch(_) {}
      doLogout();
      return;
    }
    const d = await r.json();
    allData = d.data || [];
    updateStats(); renderTable();
  } catch(e){
    document.getElementById('table-body').innerHTML =
      '<tr class="loading-row"><td colspan="9" style="color:var(--red)">Failed to load data. Check connection.</td></tr>';
  }
}
function refreshData(){ loadData(); toast('Refreshed'); }

function updateStats(){
  document.getElementById('stat-total').textContent    = allData.length;
  document.getElementById('stat-pending').textContent  = allData.filter(r=>r.status==='pending').length;
  document.getElementById('stat-approved').textContent = allData.filter(r=>r.status==='approved').length;
  document.getElementById('stat-rejected').textContent = allData.filter(r=>r.status==='rejected').length;
}

/* ── Table ──────────────────────────────────────── */
function getFiltered(){
  const q  = document.getElementById('search-input').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  return allData.filter(r => {
    const matchS = !sf || r.status === sf;
    const matchQ = !q ||
      (r.fullname||'').toLowerCase().includes(q) ||
      (r.phone||'').includes(q) ||
      (r.plate||'').toLowerCase().includes(q) ||
      (r.ref||'').toLowerCase().includes(q) ||
      (r.brand||'').toLowerCase().includes(q) ||
      (r.transport_type||'').toLowerCase().includes(q);
    return matchS && matchQ;
  });
}

function renderTable(){
  const rows  = getFiltered();
  const tbody = document.getElementById('table-body');
  if(!rows.length){
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="e-icon">🔍</div><p>No registrations found</p></div></td></tr>`;
    updateBulkButtons(); return;
  }
  tbody.innerHTML = '';
  rows.forEach(r => {
    const phone  = normalizePhone(r.phone);
    const licUrl = r.licence_file_url || '';
    const idUrl  = r.idcard_file_url  || '';
    const libUrl = r.libre_file_url   || '';
    const safeName = (r.fullname||'').replace(/['"]/g,'');
    const isBike = (r.transport_type||'').toLowerCase() === 'bike';

    /* ── main row ── */
    const tr = document.createElement('tr');
    tr.dataset.ref = r.ref;
    if(expandedRef === r.ref) tr.classList.add('expanded');
    tr.innerHTML = `
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="row-check"
          data-ref="${r.ref}" data-phone="${phone}" data-name="${safeName}"
          onchange="updateBulkButtons()"/>
      </td>
      <td onclick="toggleAcc('${r.ref}')"><span class="ref">${r.ref}</span></td>
      <td onclick="toggleAcc('${r.ref}')"><span class="name">${r.fullname||'—'}</span></td>
      <td onclick="toggleAcc('${r.ref}')"><span class="phone">${phone||'—'}</span></td>
      <td onclick="toggleAcc('${r.ref}')"><span class="plate">${r.plate||'—'}</span></td>
      <td onclick="toggleAcc('${r.ref}')">${transportLabel(r.transport_type)}</td>
      <td onclick="toggleAcc('${r.ref}')" style="color:var(--text2)">${r.brand||'—'} ${r.year||''}</td>
      <td onclick="toggleAcc('${r.ref}')">${statusBadge(r.status)}</td>
      <td onclick="toggleAcc('${r.ref}')" style="color:var(--muted);font-size:11px">${fmtDate(r.registered_at)}</td>`;
    tbody.appendChild(tr);

    /* ── accordion row ── */
    const accTr = document.createElement('tr');
    accTr.className = 'accordion-row' + (expandedRef === r.ref ? ' open' : '');
    accTr.innerHTML = `<td colspan="9">
      <div class="accordion-inner${expandedRef===r.ref?' open':''}" id="acc-${r.ref}">
        <div class="acc-grid">

          <div class="acc-section">
            <h4>Personal Information</h4>
            <div class="acc-field"><div class="key">Full Name</div><div class="val">${r.fullname||'—'}</div></div>
            <div class="acc-field"><div class="key">Phone</div><div class="val">${phone||'—'}</div></div>
            <div class="acc-field"><div class="key">Registered</div><div class="val" style="font-size:11px">${fmtDate(r.registered_at)}</div></div>
            <div class="acc-field"><div class="key">Status</div><div class="val">${statusBadge(r.status)}</div></div>
          </div>

          <div class="acc-section">
            <h4>Vehicle Information</h4>
            <div class="acc-field"><div class="key">Transport Type</div><div class="val">${transportLabel(r.transport_type)}</div></div>
            <div class="acc-field"><div class="key">Brand</div><div class="val">${r.brand||'—'}</div></div>
            <div class="acc-field"><div class="key">Year</div><div class="val">${r.year||'—'}</div></div>
            <div class="acc-field"><div class="key">Plate Number</div><div class="val">${r.plate||'—'}</div></div>
            <div class="acc-field"><div class="key">Region Code</div><div class="val">${r.platecode||'—'}</div></div>
          </div>

          <div class="acc-section">
            <h4 class="acc-doc-title">Documents <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">— tap to view</span></h4>
            <div class="doc-thumbs">
              ${isBike ? docThumbHtml(null,'Licence','Not required (Bicycles)') + docThumbHtml(idUrl,'ID Card',null) + docThumbHtml(null,'Libre','Not required (Bicycles)') : docThumbHtml(licUrl,'Licence',null) + docThumbHtml(idUrl,'ID Card',null) + docThumbHtml(libUrl,'Libre',null)}
            </div>
          </div>

        </div>
        <div class="acc-actions" id="actions-${r.ref}">
          ${actionBtns(r.ref, r.status)}
          <button class="btn btn-dl" onclick="downloadSingle('${r.ref}')">
            <span class="btn-spin"></span><span class="btn-lbl">⬇ ZIP</span>
          </button>
          <button class="btn btn-sms-single" onclick="openSmsSingle('${r.ref}','${phone}','${safeName}')">
            <span class="btn-spin"></span><span class="btn-lbl">✉ SMS</span>
          </button>
          <button class="btn btn-delete btn-delete-single" onclick="deleteSingle('${r.ref}')" title="Delete this registration">
            <span class="btn-spin"></span><span class="btn-lbl">🗑 Delete</span>
          </button>
        </div>
      </div>
    </td>`;
    tbody.appendChild(accTr);
  });
  updateBulkButtons();
}

function toggleAcc(ref){
  expandedRef = expandedRef === ref ? null : ref;
  renderTable();
  if(expandedRef){
    setTimeout(() => {
      const el = document.getElementById('acc-'+expandedRef);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 60);
  }
}

/* ── Bulk select ────────────────────────────────── */
function toggleSelectAll(cb){
  document.querySelectorAll('.row-check').forEach(c => c.checked = cb.checked);
  updateBulkButtons();
}
function updateBulkButtons(){
  const checked = document.querySelectorAll('.row-check:checked').length;
  const dlBtn   = document.getElementById('btn-dl-selected');
  const smsBtn  = document.getElementById('btn-sms-bulk');
  const delBtn  = document.getElementById('btn-delete-selected');
  if(dlBtn) dlBtn.disabled  = checked === 0;
  if(smsBtn) smsBtn.disabled = checked === 0;
  if(delBtn) delBtn.disabled = checked === 0;
  const all = document.querySelectorAll('.row-check');
  const sa  = document.getElementById('select-all');
  if(sa){ sa.indeterminate = checked>0 && checked<all.length; sa.checked = all.length>0 && checked===all.length; }
}
function getChecked(){
  return Array.from(document.querySelectorAll('.row-check:checked')).map(c => ({
    ref:c.dataset.ref, phone:c.dataset.phone, name:c.dataset.name
  }));
}

/* ── Status update ──────────────────────────────── */
async function doStatus(btn, ref, status){
  setBtnLoading(btn, true);
  try{
    const r = await fetch('/admin/update-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ref,status})});
    const d = await r.json();
    if(d.success){
      // Update local data
      const rec = allData.find(x => x.ref === ref);
      if(rec) rec.status = status;
      updateStats();
      // Refresh just the action buttons in this accordion (no full re-render flicker)
      const actDiv = document.getElementById('actions-' + ref);
      if(actDiv){
        const newBtns = actionBtns(ref, status);
        const dlBtn   = actDiv.querySelector('.btn-dl');
        const smsBtn  = actDiv.querySelector('.btn-sms-single');
        const delBtn  = actDiv.querySelector('.btn-delete-single');
        actDiv.innerHTML = newBtns;
        if(dlBtn)  actDiv.appendChild(dlBtn);
        if(smsBtn) actDiv.appendChild(smsBtn);
        if(delBtn) actDiv.appendChild(delBtn);
      }
      // Update status badge in the main row
      const mainRow = document.querySelector(`tr[data-ref="${ref}"]`);
      if(mainRow){
        const badgeCell = mainRow.cells[6];
        if(badgeCell) badgeCell.innerHTML = statusBadge(status);
        mainRow.classList.toggle('expanded', expandedRef===ref);
      }
      toast(`${ref} → ${status}`, 'ok');
    } else {
      setBtnLoading(btn, false);
      toast(d.message||'Update failed', 'err');
    }
  } catch(e){
    setBtnLoading(btn, false);
    toast('Server error', 'err');
  }
}

/* ── Delete ─────────────────────────────────────── */
async function deleteSingle(ref){
  const rec = allData.find(x => x.ref === ref);
  const name = rec ? (rec.fullname || ref) : ref;
  if(!confirm(`Delete registration ${ref} (${name})? This cannot be undone.`)) return;
  const btn = event?.currentTarget || null;
  if(btn) setBtnLoading(btn, true);
  try{
    const r = await fetch('/admin/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ref }) });
    const d = await r.json();
    if(d.success){
      allData = allData.filter(x => x.ref !== ref);
      if(expandedRef === ref) expandedRef = null;
      updateStats(); renderTable();
      toast(`${ref} deleted`, 'ok');
    } else {
      toast(d.message || 'Delete failed', 'err');
    }
  } catch(e){ toast('Server error', 'err'); }
  if(btn) setBtnLoading(btn, false);
}
async function deleteSelected(){
  const refs = getChecked().map(c => c.ref);
  if(!refs.length){ toast('Select at least one row', 'err'); return; }
  if(!confirm(`Delete ${refs.length} selected registration(s)? This cannot be undone.`)) return;
  const btn = document.getElementById('btn-delete-selected');
  if(btn) setBtnLoading(btn, true);
  try{
    const r = await fetch('/admin/delete-bulk', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refs }) });
    const d = await r.json();
    if(d.success){
      const set = new Set(refs);
      allData = allData.filter(x => !set.has(x.ref));
      if(expandedRef && set.has(expandedRef)) expandedRef = null;
      updateStats(); renderTable();
      toast(`${d.deleted || refs.length} deleted`, 'ok');
    } else {
      toast(d.message || 'Delete failed', 'err');
    }
  } catch(e){ toast('Server error', 'err'); }
  if(btn) setBtnLoading(btn, false);
}

/* ── Download ───────────────────────────────────── */
async function downloadZip(refs, triggerBtn){
  setBtnLoading(triggerBtn, true);
  toast('Preparing ZIP…');
  try{
    const r = await fetch('/admin/download-zip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refs})});
    if(!r.ok){ toast('Download failed','err'); setBtnLoading(triggerBtn,false); return; }
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    let name   = 'drivers.zip';
    if(refs.length===1){
      const rec = allData.find(x => x.ref===refs[0]);
      if(rec){ name = `${(rec.firstname||'driver').replace(/\s/g,'_')}-${normalizePhone(rec.phone)}.zip`; }
    } else {
      name = `drivers-${refs.length}-${new Date().toISOString().slice(0,10)}.zip`;
    }
    a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
    toast('Downloaded!','ok');
  } catch(e){ toast('Download error','err'); }
  setBtnLoading(triggerBtn, false);
}
function downloadSingle(ref){
  const btn = event?.currentTarget || null;
  downloadZip([ref], btn);
}
function downloadSelected(){
  const refs = getChecked().map(c=>c.ref);
  if(refs.length) downloadZip(refs, document.getElementById('btn-dl-selected'));
}

/* ── SMS ────────────────────────────────────────── */
function openSmsSingle(ref, phone, name){ smsTargets=[{ref,phone,name}]; openSmsModal(); }
function openSmsBulk(){ smsTargets=getChecked(); openSmsModal(); }
function openSmsModal(){
  document.getElementById('sms-message').value='';
  document.getElementById('char-count').textContent='0';
  document.getElementById('sms-modal-subtitle').textContent=`Sending to ${smsTargets.length} driver${smsTargets.length>1?'s':''}`;
  document.getElementById('sms-recipients').textContent=smsTargets.map(t=>`${t.name} (${t.phone})`).join(' · ');
  document.getElementById('sms-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sms-message').focus(),100);
}
function closeSmsModal(){ document.getElementById('sms-modal').classList.remove('open'); }
function updateCharCount(){ document.getElementById('char-count').textContent=document.getElementById('sms-message').value.length; }
document.getElementById('sms-modal').addEventListener('click',function(e){if(e.target===this)closeSmsModal();});

async function sendSms(){
  const msg   = document.getElementById('sms-message').value.trim();
  const btn   = document.querySelector('#sms-modal .btn-sms-toolbar');
  if(!msg){ toast('Write a message first','err'); return; }
  setBtnLoading(btn,true);
  try{
    const r = await fetch('/admin/send-sms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phones:smsTargets.map(t=>t.phone),message:msg})});
    const d = await r.json();
    closeSmsModal();
    toast(d.message||'SMS sent', d.success?'ok':'err');
  } catch(e){ toast('SMS error','err'); }
  setBtnLoading(btn,false);
}
</script>
</body>
</html>
