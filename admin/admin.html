<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MotoReg Admin — Bahiran</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0f14;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #262c3d;
  --accent: #f5a623;
  --accent2: #e8891a;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f5a623;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* ── LOGIN ─────────────────────────────── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 20%, #1a1f2e 0%, var(--bg) 70%);
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 48px 40px; width: 380px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .icon { font-size: 40px; }
.login-logo h1 { font-family: var(--mono); font-size: 18px; color: var(--accent); margin-top: 8px; letter-spacing: 2px; }
.login-logo p { color: var(--muted); font-size: 12px; margin-top: 4px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 12px 14px; border-radius: 8px;
  font-family: var(--mono); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%; background: var(--accent); color: #000; border: none;
  padding: 13px; border-radius: 8px; font-family: var(--mono); font-size: 14px;
  font-weight: 600; cursor: pointer; margin-top: 8px; letter-spacing: 1px;
  transition: background .2s;
}
.btn-login:hover { background: var(--accent2); }
.login-err { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }

/* ── MAIN LAYOUT ────────────────────────── */
#main-screen { display: none; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-left .logo { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 2px; }
.topbar-left .badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 1px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-right .admin-name { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--mono); transition: all .2s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── STATS BAR ───────────────────────────── */
.stats-bar {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  padding: 20px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
.stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.stat-card .value { font-family: var(--mono); font-size: 28px; font-weight: 600; }
.stat-card.total .value { color: var(--text); }
.stat-card.pending .value { color: var(--yellow); }
.stat-card.approved .value { color: var(--green); }
.stat-card.rejected .value { color: var(--red); }

/* ── TOOLBAR ────────────────────────────── */
.toolbar {
  padding: 16px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.search-box {
  flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 9px 14px 9px 36px; border-radius: 8px;
  font-family: var(--sans); font-size: 13px; outline: none; position: relative;
}
.search-wrap { position: relative; flex: 1; min-width: 220px; }
.search-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.search-box:focus { border-color: var(--accent); }
.filter-select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 9px 14px; border-radius: 8px; font-size: 13px; font-family: var(--sans); outline: none; cursor: pointer;
}
.btn { padding: 9px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; font-family: var(--sans); font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent2); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-sms { background: #1d4ed8; color: #fff; }
.btn-sms:hover { background: #2563eb; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── TABLE AREA ──────────────────────────── */
.table-wrap { flex: 1; overflow-x: auto; padding: 0 24px 24px; }
table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
thead th {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); font-weight: 500; white-space: nowrap;
}
thead th:first-child { width: 40px; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; cursor: pointer; }
tbody tr:hover { background: var(--surface); }
tbody tr.expanded { background: var(--surface); }
td { padding: 12px 12px; vertical-align: middle; }
td .ref { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; }
td .name { font-weight: 500; }
td .phone { font-family: var(--mono); font-size: 12px; color: var(--muted); }
td .plate { font-family: var(--mono); font-size: 12px; background: var(--surface2); padding: 2px 8px; border-radius: 4px; display: inline-block; }
.status-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .5px; display: inline-block; }
.status-pending { background: rgba(245,166,35,.15); color: var(--yellow); }
.status-approved { background: rgba(34,197,94,.15); color: var(--green); }
.status-rejected { background: rgba(239,68,68,.15); color: var(--red); }

/* ── ACCORDION ROW ───────────────────────── */
.accordion-row td { padding: 0; }
.accordion-inner {
  display: none; padding: 20px 24px; background: var(--surface2);
  border-top: 1px solid var(--border); border-bottom: 2px solid var(--accent);
}
.accordion-inner.open { display: block; }
.acc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.acc-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.acc-field { margin-bottom: 10px; }
.acc-field .key { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.acc-field .val { font-family: var(--mono); font-size: 13px; color: var(--text); }
.doc-links { display: flex; flex-direction: column; gap: 8px; }
.doc-link { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); text-decoration: none; font-size: 12px; font-family: var(--mono); transition: border-color .2s; }
.doc-link:hover { border-color: var(--accent); color: var(--accent); }
.doc-link .doc-icon { font-size: 16px; }
.acc-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.btn-approve { background: rgba(34,197,94,.2); border: 1px solid var(--green); color: var(--green); }
.btn-approve:hover { background: var(--green); color: #000; }
.btn-reject { background: rgba(239,68,68,.15); border: 1px solid var(--red); color: var(--red); }
.btn-reject:hover { background: var(--red); color: #fff; }
.btn-dl { background: rgba(59,130,246,.15); border: 1px solid var(--blue); color: var(--blue); }
.btn-dl:hover { background: var(--blue); color: #fff; }
.btn-sms-single { background: rgba(139,92,246,.15); border: 1px solid #8b5cf6; color: #8b5cf6; }
.btn-sms-single:hover { background: #8b5cf6; color: #fff; }

/* ── MODALS ──────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  width: 480px; max-width: 95vw; padding: 32px; box-shadow: 0 24px 60px rgba(0,0,0,.6);
}
.modal h3 { font-family: var(--mono); font-size: 16px; color: var(--accent); margin-bottom: 8px; }
.modal .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.modal textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 12px 14px; border-radius: 8px; font-family: var(--mono); font-size: 13px;
  resize: vertical; min-height: 120px; outline: none;
}
.modal textarea:focus { border-color: var(--accent); }
.modal .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.recipients-preview { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--muted); font-family: var(--mono); max-height: 80px; overflow-y: auto; }

/* ── EMPTY STATE ──────────────────────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── TOAST ────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent);
  color: var(--text); padding: 12px 20px; border-radius: 8px; font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,.4); transform: translateY(80px); opacity: 0;
  transition: all .3s; max-width: 320px; font-family: var(--mono);
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.err { border-left-color: var(--red); }
#toast.ok  { border-left-color: var(--green); }

/* ── LOADING ──────────────────────────────── */
.loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row td { text-align: center; padding: 48px; color: var(--muted); }

/* CHECKBOX */
input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

@media (max-width: 768px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .acc-grid { grid-template-columns: 1fr; }
  .table-wrap { padding: 0 12px 12px; }
  .toolbar { padding: 12px; }
  .topbar { padding: 0 12px; }
}
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏍️</div>
      <h1>MOTOREG</h1>
      <p>Admin Panel — Bahiran</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="••••" autocomplete="current-password" maxlength="20"/>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">SIGN IN</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<div id="main-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span>🏍️</span>
      <span class="logo">MOTOREG</span>
      <span class="badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="admin-name-display"></span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card total"><div class="label">Total</div><div class="value" id="stat-total">—</div></div>
    <div class="stat-card pending"><div class="label">Pending</div><div class="value" id="stat-pending">—</div></div>
    <div class="stat-card approved"><div class="label">Approved</div><div class="value" id="stat-approved">—</div></div>
    <div class="stat-card rejected"><div class="label">Rejected</div><div class="value" id="stat-rejected">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input class="search-box" id="search-input" type="text" placeholder="Search name, phone, plate, ref…" oninput="renderTable()"/>
    </div>
    <select class="filter-select" id="status-filter" onchange="renderTable()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
    <button class="btn btn-outline" onclick="refreshData()">↻ Refresh</button>
    <button class="btn btn-primary" id="btn-dl-selected" onclick="downloadSelected()" disabled>⬇ Download ZIP</button>
    <button class="btn btn-sms" id="btn-sms-bulk" onclick="openSmsBulk()" disabled>✉ Send SMS</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"/></th>
          <th>REF</th>
          <th>Driver</th>
          <th>Phone</th>
          <th>Plate</th>
          <th>Brand / Year</th>
          <th>Status</th>
          <th>Registered</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row"><td colspan="8"><div class="loader"></div> Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── SMS MODAL ──────────────────────────────────────────── -->
<div class="modal-overlay" id="sms-modal">
  <div class="modal">
    <h3>✉ Send SMS</h3>
    <p class="subtitle" id="sms-modal-subtitle">Sending to selected drivers</p>
    <div class="recipients-preview" id="sms-recipients"></div>
    <textarea id="sms-message" placeholder="Type your message here…" oninput="updateCharCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> / 160 chars</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSmsModal()">Cancel</button>
      <button class="btn btn-sms" onclick="sendSms()">Send SMS</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────
let allData = [];
let expandedRef = null;
let smsTargets  = []; // [{ref, phone, name}]

// ── Helpers ───────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3200);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}

function statusBadge(s) {
  const map = {pending:'status-pending',approved:'status-approved',rejected:'status-rejected'};
  return `<span class="status-badge ${map[s]||'status-pending'}">${s||'pending'}</span>`;
}

function docIcon(path) {
  if (!path) return '📄';
  const ext = path.split('.').pop().toLowerCase();
  return ext === 'pdf' ? '📕' : '🖼';
}

function normalizePhone(p) {
  if (!p) return p;
  p = p.replace(/\s|-/g,'');
  if (p.startsWith('+2519') || p.startsWith('+2517')) return '0' + p.slice(4);
  if (p.startsWith('+251')) return '0' + p.slice(4);
  if (!p.startsWith('0')) return '0' + p;
  return p;
}

// ── Auth ──────────────────────────────────────────────────────
async function doLogin() {
  const btn  = document.getElementById('login-btn');
  const user = document.getElementById('login-user').value.trim();
  const pin  = document.getElementById('login-pin').value.trim();
  const err  = document.getElementById('login-err');
  if (!user || !pin) { err.textContent = 'Enter username and PIN'; return; }
  btn.textContent = '…'; btn.disabled = true;
  try {
    const r = await fetch('/admin/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: user, pin})
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('admin-name-display').textContent = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'flex';
      loadData();
    } else {
      err.textContent = d.message || 'Invalid credentials';
    }
  } catch(e) { err.textContent = 'Server error'; }
  btn.textContent = 'SIGN IN'; btn.disabled = false;
}

document.getElementById('login-pin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pin').focus(); });

async function doLogout() {
  await fetch('/admin/logout', {method:'POST'});
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pin').value = '';
  allData = [];
}

// ── Data ──────────────────────────────────────────────────────
async function loadData() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="8"><div class="loader"></div> Loading…</td></tr>';
  try {
    const r = await fetch('/admin/registrations');
    if (r.status === 401) { doLogout(); return; }
    const d = await r.json();
    allData = d.data || [];
    updateStats();
    renderTable();
  } catch(e) {
    tbody.innerHTML = '<tr class="loading-row"><td colspan="8" style="color:var(--red)">Failed to load data</td></tr>';
  }
}

function refreshData() { loadData(); toast('Refreshed'); }

function updateStats() {
  document.getElementById('stat-total').textContent    = allData.length;
  document.getElementById('stat-pending').textContent  = allData.filter(r=>r.status==='pending').length;
  document.getElementById('stat-approved').textContent = allData.filter(r=>r.status==='approved').length;
  document.getElementById('stat-rejected').textContent = allData.filter(r=>r.status==='rejected').length;
}

// ── Table ─────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  return allData.filter(r => {
    const matchS = !sf || r.status === sf;
    const matchQ = !q ||
      (r.fullname||'').toLowerCase().includes(q) ||
      (r.phone||'').includes(q) ||
      (r.plate||'').toLowerCase().includes(q) ||
      (r.ref||'').toLowerCase().includes(q) ||
      (r.brand||'').toLowerCase().includes(q);
    return matchS && matchQ;
  });
}

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty"><div class="icon">🔍</div><p>No registrations found</p></div></td></tr>`;
    updateBulkButtons();
    return;
  }
  tbody.innerHTML = '';
  rows.forEach(r => {
    const phone = normalizePhone(r.phone);
    // Main row
    const tr = document.createElement('tr');
    tr.dataset.ref = r.ref;
    if (expandedRef === r.ref) tr.classList.add('expanded');
    tr.innerHTML = `
      <td onclick="event.stopPropagation()"><input type="checkbox" class="row-check" data-ref="${r.ref}" data-phone="${phone}" data-name="${r.fullname||''}" onchange="updateBulkButtons()"/></td>
      <td onclick="toggleAccordion('${r.ref}')"><span class="ref">${r.ref}</span></td>
      <td onclick="toggleAccordion('${r.ref}')"><span class="name">${r.fullname||'—'}</span></td>
      <td onclick="toggleAccordion('${r.ref}')"><span class="phone">${phone||'—'}</span></td>
      <td onclick="toggleAccordion('${r.ref}')"><span class="plate">${r.plate||'—'}</span></td>
      <td onclick="toggleAccordion('${r.ref}')">${r.brand||'—'} ${r.year||''}</td>
      <td onclick="toggleAccordion('${r.ref}')">${statusBadge(r.status)}</td>
      <td onclick="toggleAccordion('${r.ref}')" style="font-size:11px;color:var(--muted)">${fmtDate(r.registered_at)}</td>
    `;
    tbody.appendChild(tr);

    // Accordion row
    const accTr = document.createElement('tr');
    accTr.classList.add('accordion-row');
    accTr.dataset.accRef = r.ref;

    const licUrl = r.licence_file_url || '';
    const idUrl  = r.idcard_file_url  || '';
    const libUrl = r.libre_file_url   || '';

    accTr.innerHTML = `<td colspan="8"><div class="accordion-inner${expandedRef===r.ref?' open':''}" id="acc-${r.ref}">
      <div class="acc-grid">
        <div class="acc-section">
          <h4>Personal Info</h4>
          <div class="acc-field"><div class="key">Full Name</div><div class="val">${r.fullname||'—'}</div></div>
          <div class="acc-field"><div class="key">Phone</div><div class="val">${phone||'—'}</div></div>
          <div class="acc-field"><div class="key">Registered</div><div class="val" style="font-size:11px">${fmtDate(r.registered_at)}</div></div>
          <div class="acc-field"><div class="key">Status</div><div class="val">${statusBadge(r.status)}</div></div>
        </div>
        <div class="acc-section">
          <h4>Vehicle Info</h4>
          <div class="acc-field"><div class="key">Brand</div><div class="val">${r.brand||'—'}</div></div>
          <div class="acc-field"><div class="key">Year</div><div class="val">${r.year||'—'}</div></div>
          <div class="acc-field"><div class="key">Plate Number</div><div class="val">${r.plate||'—'}</div></div>
          <div class="acc-field"><div class="key">Region Code</div><div class="val">${r.platecode||'—'}</div></div>
        </div>
        <div class="acc-section">
          <h4>Documents</h4>
          <div class="doc-links">
            ${licUrl ? `<a href="${licUrl}" target="_blank" class="doc-link"><span class="doc-icon">${docIcon(licUrl)}</span>Driving Licence</a>` : '<span style="color:var(--muted);font-size:12px">No licence file</span>'}
            ${idUrl  ? `<a href="${idUrl}"  target="_blank" class="doc-link"><span class="doc-icon">${docIcon(idUrl)}</span>ID Card</a>` : ''}
            ${libUrl ? `<a href="${libUrl}" target="_blank" class="doc-link"><span class="doc-icon">${docIcon(libUrl)}</span>Libre</a>` : ''}
          </div>
        </div>
      </div>
      <div class="acc-actions">
        <button class="btn btn-approve" onclick="updateStatus('${r.ref}','approved')">✓ Approve</button>
        <button class="btn btn-reject"  onclick="updateStatus('${r.ref}','rejected')">✗ Reject</button>
        <button class="btn btn-dl"      onclick="downloadSingle('${r.ref}')">⬇ Download ZIP</button>
        <button class="btn btn-sms-single" onclick="openSmsSingle('${r.ref}','${phone}','${r.fullname||''}')">✉ Send SMS</button>
      </div>
    </div></td>`;
    tbody.appendChild(accTr);
  });
  updateBulkButtons();
}

function toggleAccordion(ref) {
  expandedRef = expandedRef === ref ? null : ref;
  renderTable();
  if (expandedRef) {
    setTimeout(() => {
      const el = document.getElementById('acc-' + expandedRef);
      if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

// ── Select / Bulk ─────────────────────────────────────────────
function toggleSelectAll(cb) {
  document.querySelectorAll('.row-check').forEach(c => c.checked = cb.checked);
  updateBulkButtons();
}

function updateBulkButtons() {
  const checked = document.querySelectorAll('.row-check:checked').length;
  document.getElementById('btn-dl-selected').disabled  = checked === 0;
  document.getElementById('btn-sms-bulk').disabled     = checked === 0;
  const all = document.querySelectorAll('.row-check');
  const sa  = document.getElementById('select-all');
  if (sa) sa.indeterminate = checked > 0 && checked < all.length;
  if (sa) sa.checked = all.length > 0 && checked === all.length;
}

function getChecked() {
  return Array.from(document.querySelectorAll('.row-check:checked')).map(c => ({
    ref: c.dataset.ref, phone: c.dataset.phone, name: c.dataset.name
  }));
}

// ── Status ────────────────────────────────────────────────────
async function updateStatus(ref, status) {
  try {
    const r = await fetch('/admin/update-status', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ref, status})
    });
    const d = await r.json();
    if (d.success) {
      const rec = allData.find(x => x.ref === ref);
      if (rec) rec.status = status;
      updateStats();
      renderTable();
      toast(`${ref} marked as ${status}`, 'ok');
    } else {
      toast(d.message || 'Update failed', 'err');
    }
  } catch(e) { toast('Server error', 'err'); }
}

// ── Download ──────────────────────────────────────────────────
async function downloadZip(refs) {
  toast('Preparing ZIP…');
  try {
    const r = await fetch('/admin/download-zip', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({refs})
    });
    if (!r.ok) { toast('Download failed', 'err'); return; }
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    // Name = firstname-phone.zip for single, else multi-driver-YYYYMMDD.zip
    let name = 'drivers.zip';
    if (refs.length === 1) {
      const rec = allData.find(x => x.ref === refs[0]);
      if (rec) {
        const fn = (rec.firstname||'driver').replace(/\s/g,'_');
        const ph = normalizePhone(rec.phone);
        name = `${fn}-${ph}.zip`;
      }
    } else {
      name = `drivers-${refs.length}-${new Date().toISOString().slice(0,10)}.zip`;
    }
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
    toast('Downloaded!', 'ok');
  } catch(e) { toast('Download error', 'err'); }
}

function downloadSingle(ref) { downloadZip([ref]); }
function downloadSelected() {
  const refs = getChecked().map(c => c.ref);
  if (refs.length) downloadZip(refs);
}

// ── SMS ───────────────────────────────────────────────────────
function openSmsSingle(ref, phone, name) {
  smsTargets = [{ref, phone, name}];
  openSmsModal();
}
function openSmsBulk() {
  smsTargets = getChecked();
  openSmsModal();
}
function openSmsModal() {
  document.getElementById('sms-message').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('sms-modal-subtitle').textContent =
    `Sending to ${smsTargets.length} driver${smsTargets.length>1?'s':''}`;
  document.getElementById('sms-recipients').textContent =
    smsTargets.map(t => `${t.name} (${t.phone})`).join(' · ');
  document.getElementById('sms-modal').classList.add('open');
  setTimeout(() => document.getElementById('sms-message').focus(), 100);
}
function closeSmsModal() { document.getElementById('sms-modal').classList.remove('open'); }
function updateCharCount() {
  const len = document.getElementById('sms-message').value.length;
  document.getElementById('char-count').textContent = len;
}
document.getElementById('sms-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSmsModal();
});

async function sendSms() {
  const message = document.getElementById('sms-message').value.trim();
  if (!message) { toast('Write a message first', 'err'); return; }
  const phones = smsTargets.map(t => t.phone);
  try {
    const r = await fetch('/admin/send-sms', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({phones, message})
    });
    const d = await r.json();
    closeSmsModal();
    toast(d.message || 'SMS sent', d.success ? 'ok' : 'err');
  } catch(e) { toast('SMS error', 'err'); }
}
</script>
